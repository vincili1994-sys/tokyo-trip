<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>東京私旅 - 雲端多機同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fee2e2; }
    </style>
</head>
<body class="text-slate-700">

<div id="app" class="max-w-md mx-auto min-h-screen bg-white flex flex-col shadow-2xl pb-24">
    <header class="bg-sky-950 p-5 text-white">
        <h1 class="font-bold">東京五日慢遊</h1>
        <div class="flex items-center gap-2 text-xs mt-2 bg-sky-900 p-2 rounded">
            <span>連線狀態:</span>
            <span :class="isSynced ? 'text-emerald-400' : 'text-rose-400'">● {{ isSynced ? '已連線至雲端' : '同步中...' }}</span>
        </div>
    </header>

    <main class="p-4">
        <button @click="testUpdate" class="w-full bg-sky-900 text-white p-3 rounded-xl mb-4">測試同步更新</button>
        <div v-for="exp in expenses" class="p-3 border-b">{{ exp.name }} - ¥{{ exp.amount }}</div>
    </main>
</div>

<script>
const { createApp, ref, onMounted } = Vue;

const SUPABASE_URL = "https://vumrenvgdbjeaiuvnuzx.supabase.co";
const SUPABASE_ANON_KEY = "IUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1bXJlbnZnZGJqZWFpdXZudXp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNTI4NDcsImV4cCI6MjA5NjYyODg0N30.Rn_WmoNaz1-PfHDznfJY0g_UU-kWs3UR4Wd5e2SchEo";
const FIXED_ROOM_ID = "tokyo2026_family";

createApp({
    setup() {
        const isSynced = ref(false);
        const expenses = ref([]);
        let supabaseClient = null;

        const connect = async () => {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // 載入資料
            const { data } = await supabaseClient.from('trips').select('*').eq('room_id', FIXED_ROOM_ID).maybeSingle();
            if (data) {
                expenses.value = data.expenses || [];
                isSynced.value = true;
            }

            // 即時監聽
            supabaseClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'trips' }, payload => {
                expenses.value = payload.new.expenses;
            }).subscribe();
        };

        const testUpdate = async () => {
            expenses.value.push({ name: '測試', amount: Math.floor(Math.random()*1000) });
            await supabaseClient.from('trips').update({ expenses: expenses.value }).eq('room_id', FIXED_ROOM_ID);
        };

        onMounted(connect);
        return { isSynced, expenses, testUpdate };
    }
}).mount('#app');
</script>
</body>
</html>
